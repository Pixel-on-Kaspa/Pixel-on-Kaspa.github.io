<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tracking opt-out — PIXEL admin</title>
<style>
body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #e0e0e0; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
.box { max-width: 400px; width: 100%; padding: 32px; border: 1px solid #222; border-radius: 8px; }
h1 { font-size: 16px; font-weight: 600; margin-bottom: 24px; color: #fff; }
.status { font-size: 13px; margin-bottom: 24px; padding: 10px 14px; border-radius: 4px; }
.status.enabled  { background: rgba(73,234,203,.1); color: #49EACB; border: 1px solid rgba(73,234,203,.2); }
.status.disabled { background: rgba(255,80,80,.1);  color: #ff6b6b; border: 1px solid rgba(255,80,80,.2); }
button { display: block; width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #333; border-radius: 4px; background: #161616; color: #e0e0e0; font-size: 13px; cursor: pointer; }
button:hover { background: #1e1e1e; border-color: #444; }
</style>
</head>
<body>
<div class="box">
  <h1>Umami tracking opt-out</h1>
  <div class="status" id="status"></div>
  <button onclick="disable()">Disable tracking</button>
  <button onclick="enable()">Enable tracking</button>
</div>
<script>
function getStatus() {
  return localStorage.getItem('umami.disabled') ? 'disabled' : 'enabled';
}
function render() {
  var s = getStatus();
  var el = document.getElementById('status');
  el.textContent = 'Tracking: ' + s;
  el.className = 'status ' + s;
}
function disable() { localStorage.setItem('umami.disabled', '1'); render(); }
function enable()  { localStorage.removeItem('umami.disabled'); render(); }
render();
</script>
</body>
</html>
