<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PIXEL NFT Viewer – PIXELONKAS & SYKORA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:     #050a0a;
      --bg2:    #0a0f0f;
      --card:   #0d1117;
      --border: rgba(255,255,255,.08);
      --border-hover: rgba(73,234,203,.35);
      --muted:  rgba(255,255,255,.50);
      --accent: #49EACB;
      --accent-dim: rgba(73,234,203,.10);
      --text:   #f0f0f0;
      --danger: #ffb4b4;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:"Open Sans",system-ui,-apple-system,"Segoe UI",sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
    }

    /* ── TOPBAR ── */
    .topbar{
      position:sticky;top:0;z-index:100;
      display:flex;align-items:center;justify-content:space-between;
      gap:12px;padding:0 24px;height:52px;
      background:rgba(5,10,10,.97);
      border-bottom:1px solid var(--border);
    }
    .brand{
      font-weight:900;font-size:13px;letter-spacing:.14em;text-transform:uppercase;
      color:var(--text);text-decoration:none;
    }
    .brand span{color:var(--accent);}
    .topNav{display:flex;gap:6px;align-items:center;}
    .btn{
      display:inline-flex;align-items:center;gap:6px;
      padding:6px 12px;
      font-family:inherit;font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
      color:var(--text);text-decoration:none;
      background:transparent;
      border:1px solid var(--border);
      border-radius:4px;
      cursor:pointer;
      transition:color .15s,border-color .15s,background .15s;
    }
    .btn:hover{color:var(--text);border-color:rgba(255,255,255,.22);}
    .btnPrimary{background:var(--accent);color:#020308;border-color:var(--accent);}
    .btnPrimary:hover{background:#5fffd8;border-color:#5fffd8;color:#020308;}

    /* ── LAYOUT ── */
    .wrap{max-width:1200px;margin:0 auto;padding:28px 24px 60px;}

    /* ── COLLECTION SWITCHER ── */
    .switcher{
      display:inline-flex;gap:4px;
      border:1px solid var(--border);
      border-radius:4px;
      padding:3px;
      background:var(--bg2);
      margin-bottom:24px;
    }
    .switchBtn{
      border:1px solid transparent;background:transparent;
      color:var(--muted);
      padding:7px 16px;
      font-family:inherit;font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
      cursor:pointer;border-radius:3px;
      transition:color .15s,border-color .15s,background .15s;
    }
    .switchBtn.active{
      border-color:var(--accent);
      color:var(--accent);
      background:var(--accent-dim);
    }

    /* ── META BOX ── */
    #metaBox{
      border-left:3px solid var(--accent);
      border-top:1px solid var(--border);
      border-right:1px solid var(--border);
      border-bottom:1px solid var(--border);
      padding:14px 18px;
      background:var(--bg2);
      margin-bottom:20px;
    }
    #metaRow{
      display:flex;gap:12px;flex-wrap:wrap;align-items:center;justify-content:space-between;
    }
    #metaTitle{font-weight:900;font-size:14px;letter-spacing:.12em;text-transform:uppercase;}
    .pill{
      padding:5px 11px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.04);
      border-radius:4px;
      font-size:12px;
      font-weight:700;
      letter-spacing:.06em;
    }

    /* ── STATUS ── */
    #statusLine{
      font-size:12px;color:var(--muted);
      margin-bottom:14px;letter-spacing:.04em;
    }

    /* ── GRID ── */
    #grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
      gap:1px;
      background:var(--border);
      border:1px solid var(--border);
    }
    .card{
      background:var(--card);
      padding:12px;
      display:flex;flex-direction:column;gap:8px;
      position:relative;
      transition:background .15s;
    }
    .card::after{
      content:"";
      position:absolute;bottom:0;left:0;right:0;
      height:2px;background:var(--accent);
      transform:scaleX(0);transform-origin:left;
      transition:transform .22s ease;
    }
    .card:hover{background:#0b1219;}
    .card:hover::after{transform:scaleX(1);}

    .thumb{
      width:100%;aspect-ratio:1/1;
      background:#000;
      overflow:hidden;
      display:flex;align-items:center;justify-content:center;
      color:var(--muted);font-size:12px;text-align:center;
      cursor:zoom-in;
      border:1px solid var(--border);
    }
    .thumb img{width:100%;height:100%;object-fit:cover;display:block;}
    .row{display:flex;justify-content:space-between;gap:8px;align-items:center;}
    .nftId{font-weight:900;font-size:13px;letter-spacing:.06em;}
    .badge{
      padding:3px 8px;
      border:1px solid rgba(73,234,203,.28);
      background:rgba(73,234,203,.07);
      color:var(--accent);
      font-size:11px;font-weight:800;letter-spacing:.06em;
    }
    .titleLine{font-weight:700;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .metaLine{font-size:11px;color:var(--muted);opacity:.7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

    /* ── LOAD MORE ── */
    #loadMoreWrap{display:flex;justify-content:center;margin:18px 0 0;}
    #loadMoreBtn{display:none;}

    /* ── ERROR ── */
    .errBox{
      grid-column:1/-1;
      padding:14px 18px;
      border-left:3px solid var(--danger);
      border-top:1px solid rgba(255,180,180,.18);
      border-right:1px solid rgba(255,180,180,.18);
      border-bottom:1px solid rgba(255,180,180,.18);
      color:var(--danger);
      background:rgba(255,180,180,.04);
      font-size:13px;
    }

    /* ── LIGHTBOX ── */
    #lightbox{
      position:fixed;inset:0;
      display:none;align-items:center;justify-content:center;
      padding:18px;
      background:rgba(0,0,0,.82);
      z-index:9999;
    }
    #lightbox.open{display:flex;}
    .lbPanel{
      width:min(1100px,96vw);
      max-height:92vh;overflow:auto;
      border:1px solid rgba(255,255,255,.10);
      background:#080e0e;
      box-shadow:0 30px 80px rgba(0,0,0,.85);
    }
    .lbTop{
      display:flex;justify-content:space-between;align-items:center;
      gap:12px;padding:14px 20px;
      border-bottom:1px solid var(--border);
      position:sticky;top:0;background:#080e0e;z-index:1;
    }
    .lbTitle{display:flex;flex-direction:column;gap:2px;}
    .lbTitle b{letter-spacing:.1em;text-transform:uppercase;font-size:14px;}
    .lbTitle span{font-size:11px;color:var(--muted);}
    .lbActions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;}
    .lbBody{
      display:grid;grid-template-columns:1.2fr .8fr;
      gap:14px;padding:16px;
    }
    .lbImgWrap{
      background:#000;
      border:1px solid var(--border);
      display:flex;align-items:center;justify-content:center;
      min-height:320px;
      overflow:hidden;
    }
    .lbImgWrap img{
      width:100%;height:auto;max-height:75vh;
      object-fit:contain;display:block;cursor:zoom-out;
    }
    .lbSide{
      border:1px solid var(--border);
      background:rgba(255,255,255,.02);
      padding:14px;overflow:auto;
    }
    .kv{margin:0 0 28px;padding-top:8px;}
    .kv .k{
      font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
      color:var(--muted);margin-bottom:6px;
    }
    .kv .v{font-size:16px;word-break:break-word;line-height:1.7;}
    .kv .v.desc{max-width:320px;word-break:normal;}
    .ownerRow{display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap;}
    .attrs{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;}
    .chip{
      border:1px solid var(--border);
      background:rgba(0,0,0,.18);
      padding:6px 12px;
      font-size:13px;
    }
    @media(max-width:860px){
      .lbBody{grid-template-columns:1fr;}
      .lbImgWrap{min-height:240px;}
      .topbar{padding:0 16px;}
      .wrap{padding:16px 12px 48px;}
      #grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));}
    }
  </style>
</head>
<body>

<div class="topbar">
  <a class="brand" href="index.html">PIXEL ON <span>KASPA</span></a>
  <nav class="topNav">
    <a class="btn" href="index.html">Home</a>
    <a class="btn btnPrimary" id="topMintBtn" href="#" target="_blank" rel="noreferrer">Mint</a>
  </nav>
</div>

<div class="wrap">

  <div class="switcher">
    <button class="switchBtn active" data-collection="PIXELONKAS">PIXELONKAS</button>
    <button class="switchBtn" data-collection="SYKORA">SYKORA</button>
  </div>

  <section id="metaBox">
    <div id="metaRow">
      <div>
        <div id="metaTitle">—</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;align-items:center;">
        <div id="metaMinted" class="pill">Minted: —</div>
        <div id="metaMax" class="pill">Max: —</div>
        <a id="mintBtn" class="btn btnPrimary" href="#" target="_blank" rel="noreferrer">Mint on kaspa.com</a>
      </div>
    </div>
  </section>

  <div id="statusLine">Ready.</div>

  <section>
    <div id="grid"></div>
    <div id="loadMoreWrap">
      <button id="loadMoreBtn" class="btn">Load more</button>
    </div>
  </section>

</div>

<!-- Lightbox -->
<div id="lightbox" aria-hidden="true">
  <div class="lbPanel" role="dialog" aria-modal="true">
    <div class="lbTop">
      <div class="lbTitle">
        <b id="lbHeading">—</b>
        <span id="lbSub">—</span>
      </div>
      <div class="lbActions">
        <a id="lbMint" class="btn btnPrimary" href="#" target="_blank" rel="noreferrer">Mint on kaspa.com</a>
        <button id="lbFs" class="btn" type="button">Full screen</button>
        <button id="lbClose" class="btn" type="button">Close</button>
      </div>
    </div>
    <div class="lbBody">
      <div class="lbImgWrap" id="lbImgWrap"></div>
      <div class="lbSide" id="lbSide"></div>
    </div>
  </div>
</div>

<script>
(() => {
  const API_BASE = "https://mainnet.krc721.stream/api/v1/krc721/mainnet";

  const IPFS_GATEWAYS = [
    "https://dweb.link/ipfs/",
    "https://ipfs.io/ipfs/",
    "https://cloudflare-ipfs.com/ipfs/",
  ];

  const PAGE_SIZE = 60;
  const META_CONCURRENCY = 8;

  // krc721.stream /ranges/{tick} returns AVAILABLE (unminted) ranges as string.
  // minted = max - available_count. This is the correct interpretation.
  const COLLECTIONS = {
    PIXELONKAS: {
      buri: "ipfs://bafybeih2phpjzxfrszsscpmxdr44kliaddto3sicsdh44kgx7b3f43fdvm",
      max: 342,
      idMin: 1
    },
    SYKORA: {
      buri: "ipfs://bafybeifema4upmzu7c4iipvxdagctirxf46g3htmsin6l66zm77dibfhaq",
      max: 2518,
      idMin: 1
    }
  };

  function kaspaCollectionUrl(ticker){
    return `https://kaspa.com/nft/collections/${encodeURIComponent(String(ticker))}`;
  }

  const qs  = (s) => document.querySelector(s);
  const qsa = (s) => Array.from(document.querySelectorAll(s));
  const gridEl = () => qs("#grid");

  function setStatus(html){ qs("#statusLine").innerHTML = html; }
  function setText(id, t){ const el=document.getElementById(id); if(el) el.textContent=t; }
  function showLoadMore(show){ qs("#loadMoreBtn").style.display = show ? "inline-flex" : "none"; }
  function renderError(msg){ gridEl().innerHTML = `<div class="errBox">${msg}</div>`; }

  function ipfsPath(ipfsUrl){
    if(!ipfsUrl) return "";
    if(ipfsUrl.startsWith("ipfs://")) return ipfsUrl.slice("ipfs://".length);
    const m = ipfsUrl.match(/\/ipfs\/(.+)$/);
    return m ? m[1] : "";
  }

  async function fetchJson(url, signal){
    const r = await fetch(url, { cache:"no-store", signal });
    if(!r.ok) throw new Error(`${url} HTTP ${r.status}`);
    return r.json();
  }

  function unwrapResult(x){
    if(x && typeof x === "object" && "result" in x) return x.result;
    return x;
  }

  async function fetchJsonFromGateways(paths, signal){
    let lastErr = null;
    for(const p of paths){
      for(const gw of IPFS_GATEWAYS){
        const url = gw + p;
        try{
          const r = await fetch(url, { cache:"no-store", signal, redirect:"follow" });
          if(!r.ok) throw new Error(`HTTP ${r.status}`);
          return { json: await r.json(), url };
        }catch(e){
          lastErr = e;
        }
      }
    }
    throw lastErr || new Error("IPFS fetch failed");
  }

  function firstTruthy(...vals){ for(const v of vals){ if(v) return v; } return ""; }

  function extractImageFromMeta(meta){
    const raw = firstTruthy(
      meta?.image,
      meta?.image_url,
      meta?.properties?.image,
      meta?.data?.image,
      meta?.content?.image,
      meta?.content?.url
    );
    if(!raw) return { primary:"", ipfs:null };
    if(raw.startsWith("ipfs://")){
      const p = ipfsPath(raw);
      return { primary: IPFS_GATEWAYS[0] + p, ipfs: p };
    }
    return { primary: raw, ipfs: null };
  }

  function availableCountFromRangesString(s){
    if(typeof s !== "string" || !s.trim()) return 0;
    const nums = s.split(",").map(x => Number(x.trim())).filter(Number.isFinite);
    let count = 0;
    for(let i=1;i<nums.length;i+=2) count += nums[i];
    return count;
  }

  function availableSetFromRangesString(s){
    const nums = s.split(",").map(x => Number(x.trim())).filter(Number.isFinite);
    const set = new Set();
    for(let i=0;i<nums.length-1;i+=2){
      const start = nums[i], len = nums[i+1];
      for(let j=0;j<len;j++) set.add(start + j);
    }
    return set;
  }

  function mintedIdsFromAvailableRanges({ idMin, max, rangesString }){
    const avail = availableSetFromRangesString(rangesString);
    const out = [];
    for(let id=idMin; id<=max; id++){
      if(!avail.has(id)) out.push(id);
    }
    return out;
  }

  function escapeHtml(str){
    return String(str)
      .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
      .replaceAll('"',"&quot;").replaceAll("'","&#039;");
  }

  function truncateAddr(addr){
    if(!addr || addr.length <= 18) return addr;
    return addr.slice(0, 10) + "…" + addr.slice(-6);
  }

  async function fetchOwner(tick, tokenId, signal){
    try{
      const url = `${API_BASE}/nfts/${encodeURIComponent(tick)}/${tokenId}`;
      const raw = await fetchJson(url, signal);
      const res = unwrapResult(raw);
      return res?.owner || null;
    }catch(e){
      return null;
    }
  }

  function metaCandidatePaths(buri, tick, tokenId){
    const folder = ipfsPath(buri).replace(/\/+$/,"");
    const t = String(tick);
    return [
      `${folder}/${tokenId}.json`,
      `${folder}/${tokenId}`,
      `${folder}/${tokenId}/index.json`,
      `${folder}/metadata/${tokenId}.json`,
      `${folder}/metadata/${tokenId}`,
      `${folder}/metadata/${tokenId}/index.json`,
      `${folder}/meta/${tokenId}.json`,
      `${folder}/meta/${tokenId}`,
      `${folder}/meta/${tokenId}/index.json`,
      `${folder}/${t}/${tokenId}`,
      `${folder}/${t}/${tokenId}/index.json`,
      `${folder}/${t.toLowerCase()}/${tokenId}`,
      `${folder}/${t.toLowerCase()}/${tokenId}/index.json`
    ];
  }

  async function fetchRangesMeta(tick, signal){
    const raw = await fetchJson(`${API_BASE}/ranges/${encodeURIComponent(tick)}`, signal);
    const res = unwrapResult(raw);
    if(typeof res === "string"){
      return { tick, rangesString: res };
    }
    if(res && typeof res === "object"){
      if(typeof res.ranges === "string") return { tick: res.tick || tick, rangesString: res.ranges };
      if(Array.isArray(res)){
        const found = res.find(x => String(x?.tick).toUpperCase() === String(tick).toUpperCase());
        if(found && typeof found.ranges === "string") return { tick: found.tick || tick, rangesString: found.ranges };
      }
    }
    return { tick, rangesString: null };
  }

  // ── Lightbox ──
  const lb = {
    root:     qs("#lightbox"),
    imgWrap:  qs("#lbImgWrap"),
    side:     qs("#lbSide"),
    heading:  qs("#lbHeading"),
    sub:      qs("#lbSub"),
    closeBtn: qs("#lbClose"),
    mint:     qs("#lbMint"),
    fsBtn:    qs("#lbFs")
  };

  let lbAbort = null;

  function requestFs(el){
    if(!el) return;
    const fn = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
    if(fn) fn.call(el);
  }

  async function openLightbox({ tick, tokenId, meta, imgUrl, imgIpfs, mintUrl }){
    // Cancel any previous owner fetch
    if(lbAbort) lbAbort.abort();
    lbAbort = new AbortController();

    lb.heading.textContent = `${tick} #${tokenId}`;
    lb.sub.textContent = meta?.name ? meta.name : "";
    lb.mint.href = mintUrl || "#";

    lb.imgWrap.innerHTML = imgUrl
      ? `<img id="lbImg" src="${imgUrl}" alt="">`
      : `<div style="opacity:.7;padding:18px;font-size:13px;">No image</div>`;

    const imgEl = lb.imgWrap.querySelector("img");
    if(imgEl && imgIpfs){
      let gwIndex = 0;
      imgEl.onerror = () => {
        gwIndex++;
        if(gwIndex < IPFS_GATEWAYS.length){
          imgEl.src = IPFS_GATEWAYS[gwIndex] + imgIpfs;
        }else{
          lb.imgWrap.textContent = "Image error";
        }
      };
      imgEl.onclick = () => closeLightbox();
    }
    lb.fsBtn.onclick = () => requestFs(imgEl || lb.imgWrap);

    const name  = meta?.name || `#${tokenId}`;
    const desc  = meta?.description || "";
    const attrs = Array.isArray(meta?.attributes) ? meta.attributes
      : (Array.isArray(meta?.properties?.attributes) ? meta.properties.attributes : []);

    lb.side.innerHTML = `
      <div class="kv">
        <div class="k">Name</div>
        <div class="v">${escapeHtml(name)}</div>
      </div>
      <div class="kv">
        <div class="k">Description</div>
        <div class="v desc">${desc ? escapeHtml(desc) : `<span style="opacity:.5">—</span>`}</div>
      </div>
      <div class="kv">
        <div class="k">Attributes</div>
        <div class="v">
          ${attrs && attrs.length ? `
            <div class="attrs">
              ${attrs.slice(0, 64).map(a => {
                const t = a?.trait_type ?? a?.trait ?? a?.type ?? "Trait";
                const v = a?.value ?? a?.val ?? "";
                return `<span class="chip">${escapeHtml(String(t))}: <b>${escapeHtml(String(v))}</b></span>`;
              }).join("")}
            </div>
          ` : `<span style="opacity:.5">—</span>`}
        </div>
      </div>
      <div class="kv" id="lbOwnerRow" style="align-items:center;">
        <div class="k">Owner</div>
        <div class="v" style="display:flex;align-items:center;gap:6px;"><span style="opacity:.5;font-size:12px;">Loading…</span></div>
      </div>
    `;

    lb.root.classList.add("open");
    lb.root.setAttribute("aria-hidden", "false");

    // Fetch owner async and update the placeholder
    fetchOwner(tick, tokenId, lbAbort.signal).then(owner => {
      const row = document.getElementById("lbOwnerRow");
      if(!row) return;
      const vEl = row.querySelector(".v");
      if(!vEl) return;
      if(owner){
        const full = escapeHtml(owner);
        const truncated = owner.length > 16 ? owner.slice(0,10) + '…' + owner.slice(-6) : owner;
        vEl.innerHTML = `<span style="font-family:monospace;font-size:13px;line-height:1;" title="${full}">${escapeHtml(truncated)}</span><button class="btn" type="button" style="padding:2px 7px;font-size:11px;flex-shrink:0;opacity:.7;" onclick="navigator.clipboard.writeText('${full}').then(()=>{this.textContent='✓';setTimeout(()=>this.textContent='Copy',1200)})">Copy</button>`;
      }else{
        vEl.innerHTML = `<span style="opacity:.5">—</span>`;
      }
    });
  }

  function closeLightbox(){
    if(lbAbort){ lbAbort.abort(); lbAbort = null; }
    lb.root.classList.remove("open");
    lb.root.setAttribute("aria-hidden", "true");
    lb.imgWrap.innerHTML = "";
    lb.side.innerHTML = "";
  }
  lb.closeBtn.addEventListener("click", closeLightbox);
  lb.root.addEventListener("click", (e) => { if(e.target === lb.root) closeLightbox(); });
  document.addEventListener("keydown", (e) => { if(e.key === "Escape" && lb.root.classList.contains("open")) closeLightbox(); });

  // ── Grid ──
  function cardSkeleton(tick, tokenId){
    return `
      <div class="card" data-tick="${tick}" data-tokenid="${tokenId}">
        <div class="thumb">Loading…</div>
        <div class="row">
          <div class="nftId">#${tokenId}</div>
          <div class="badge">Minted</div>
        </div>
        <div class="titleLine" data-title>${tick} #${tokenId}</div>
        <div class="metaLine" data-desc>—</div>
      </div>
    `;
  }

  const metaCache = new Map();

  let currentTick = "PIXELONKAS";
  let currentBuri = null;
  let currentRangesString = null;
  let mintedIds = [];
  let pageIndex = 0;
  let maxSupply = null;
  let abortCtrl = null;

  function setActiveButton(tick){
    qsa(".switchBtn").forEach(btn => {
      btn.classList.toggle("active", btn.getAttribute("data-collection") === tick);
    });
  }

  async function loadCollection(tick){
    currentTick = tick;
    currentBuri = null;
    currentRangesString = null;
    mintedIds = [];
    pageIndex = 0;
    maxSupply = null;

    showLoadMore(false);
    gridEl().innerHTML = "";

    if(abortCtrl) abortCtrl.abort();
    abortCtrl = new AbortController();

    setText("metaTitle", tick);
    const mintUrl = kaspaCollectionUrl(tick);
    qs("#mintBtn").href = mintUrl;
    qs("#topMintBtn").href = mintUrl;

    setText("metaMinted", "Minted: —");
    setText("metaMax", "Max: —");
    setStatus(`Loading <b>${tick}</b>…`);

    const cfg = COLLECTIONS[tick];
    if(!cfg){
      renderError(`Missing config for <b>${tick}</b>.`);
      setStatus(`Missing config.`);
      return;
    }

    try{
      const meta = await fetchRangesMeta(tick, abortCtrl.signal);
      currentRangesString = meta.rangesString || null;
      currentBuri = cfg.buri || null;
      maxSupply   = cfg.max;
      const idMin = cfg.idMin;

      if(!currentRangesString){
        renderError(`Missing ranges for <b>${tick}</b> from krc721.stream.`);
        setStatus(`Missing ranges.`);
        return;
      }
      if(!currentBuri){
        renderError(`Missing buri for <b>${tick}</b>.`);
        setStatus(`Missing buri.`);
        return;
      }
      if(!Number.isFinite(maxSupply) || !Number.isFinite(idMin)){
        renderError(`Missing max or idMin for <b>${tick}</b>.`);
        setStatus(`Missing max/idMin.`);
        return;
      }

      // rangesString = AVAILABLE (unminted) IDs — minted = total - available
      const availableCount = availableCountFromRangesString(currentRangesString);
      const totalSupply    = (maxSupply - idMin + 1);
      const mintedCount    = Math.max(0, totalSupply - availableCount);

      mintedIds = mintedIdsFromAvailableRanges({ idMin, max: maxSupply, rangesString: currentRangesString });

      setText("metaMinted", `Minted: ${mintedCount}`);
      setText("metaMax",    `Max: ${maxSupply}`);

      await renderNextPage();

    }catch(e){
      if(e.name === "AbortError") return;
      renderError(`Failed to load <b>${tick}</b>.<br><code>${escapeHtml(String(e.message || e))}</code>`);
      setStatus(`Error.`);
      console.error(e);
    }
  }

  async function renderNextPage(){
    const tick = currentTick;
    const buri = currentBuri;
    if(!tick || !buri) return;

    const ids = mintedIds.slice(pageIndex, pageIndex + PAGE_SIZE);
    if(ids.length === 0){
      showLoadMore(false);
      setStatus(`No more items.`);
      return;
    }

    gridEl().insertAdjacentHTML("beforeend", ids.map(id => cardSkeleton(tick, id)).join(""));
    setStatus(`Loading metadata (${ids.length} items)…`);

    let idx = 0;
    const cards = Array.from(document.querySelectorAll(`.card[data-tick="${tick}"]`)).slice(-ids.length);

    async function worker(){
      while(idx < cards.length){
        const card    = cards[idx++];
        const tokenId = Number(card.getAttribute("data-tokenid"));
        const cacheKey = `${tick}:${tokenId}`;
        const thumb   = card.querySelector(".thumb");
        const titleEl = card.querySelector("[data-title]");
        const descEl  = card.querySelector("[data-desc]");

        try{
          let meta = metaCache.get(cacheKey);
          if(!meta){
            const paths = metaCandidatePaths(buri, tick, tokenId);
            const { json } = await fetchJsonFromGateways(paths, abortCtrl.signal);
            meta = json;
            metaCache.set(cacheKey, meta);
          }

          const name = meta?.name || `${tick} #${tokenId}`;
          const desc = meta?.description || "";
          if(titleEl) titleEl.textContent = name;
          if(descEl)  descEl.textContent  = desc || "—";

          const { primary, ipfs } = extractImageFromMeta(meta);
          if(primary && thumb){
            thumb.innerHTML = `<img src="${primary}" alt="" loading="lazy">`;
            const imgEl = thumb.querySelector("img");
            if(imgEl && ipfs){
              let gwIndex = 0;
              imgEl.onerror = () => {
                gwIndex++;
                if(gwIndex < IPFS_GATEWAYS.length){
                  imgEl.src = IPFS_GATEWAYS[gwIndex] + ipfs;
                }else{
                  thumb.textContent = "Image error";
                }
              };
            }
            thumb.onclick = () => {
              openLightbox({ tick, tokenId, meta, imgUrl: primary, imgIpfs: ipfs, mintUrl: kaspaCollectionUrl(tick) });
            };
          }else{
            if(thumb) thumb.textContent = "No image in JSON";
          }
        }catch(e){
          if(e.name === "AbortError") return;
          if(thumb)  thumb.textContent  = "Meta error";
          if(descEl) descEl.textContent = "—";
        }
      }
    }

    await Promise.all(Array.from({length: META_CONCURRENCY}, worker));

    pageIndex += ids.length;
    showLoadMore(pageIndex < mintedIds.length);
    setStatus(`Ready. Loaded ${pageIndex} items.`);
  }

  qsa(".switchBtn").forEach(btn => {
    btn.addEventListener("click", () => {
      const tick = btn.getAttribute("data-collection");
      setActiveButton(tick);
      loadCollection(tick);
    });
  });

  qs("#loadMoreBtn").addEventListener("click", () => renderNextPage());

  loadCollection("PIXELONKAS");
})();
</script>
</body>
</html>
