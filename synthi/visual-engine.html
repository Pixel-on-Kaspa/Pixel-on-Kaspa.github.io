<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SYNTHI Visual Engine</title>
<style>
:root {
  --bg:#050808; --bg2:#0a0f0f; --panel:#0d1414; --border:rgba(255,255,255,.09);
  --accent:#49EACB; --purple:#9B59B6; --text:#e8f0ef; --muted:rgba(232,240,239,.42);
  --mono:"JetBrains Mono","Fira Code",ui-monospace,monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;font-size:13px}
button{font-family:inherit;cursor:pointer}
input[type=range]{cursor:pointer}

/* topbar */
#topbar{min-height:82px;height:auto;display:flex;align-items:center;gap:10px;padding:6px 14px;
  border-bottom:1px solid var(--border);background:rgba(5,8,8,.96);flex-shrink:0;}
.brand{font-weight:900;letter-spacing:.18em;font-size:14px;color:var(--accent);margin-right:6px;white-space:nowrap}
.transport{display:flex;align-items:center;gap:8px;flex:1;justify-content:center}
#statusBar{font-size:11px;color:var(--muted);font-family:var(--mono);white-space:nowrap;min-width:180px;text-align:right}

/* layout — footer 28px, topbar 46px → main = calc(100vh - 74px) */
#main{display:flex;height:calc(100vh - 110px);overflow:hidden}
#panelL,#panelR{width:260px;flex-shrink:0;overflow-y:auto;overflow-x:visible;padding:7px;
  border-right:1px solid var(--border)}
#panelR{border-right:none;border-left:1px solid var(--border)}
#panelL::-webkit-scrollbar,#panelR::-webkit-scrollbar{width:3px}
#panelL::-webkit-scrollbar-thumb,#panelR::-webkit-scrollbar-thumb{background:rgba(73,234,203,.2);border-radius:2px}
#center{flex:1;display:flex;align-items:center;justify-content:center;position:relative;background:var(--bg);overflow:hidden}
#vizCanvas{display:block;width:min(calc(100vw - 520px),calc(100vh - 110px));height:min(calc(100vw - 520px),calc(100vh - 110px));aspect-ratio:1/1}


/* footer */
#footer{height:28px;display:flex;align-items:center;padding:0 14px;
  border-top:1px solid var(--border);background:rgba(5,8,8,.96);
  font-size:11px;color:var(--muted);font-family:var(--mono);flex-shrink:0;gap:16px}

/* cards */
.card{background:var(--panel);border:1px solid var(--border);margin-bottom:6px;padding:8px 9px}
.cardHead{font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;
  color:var(--muted);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.led{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.12);flex-shrink:0}
.led.on{background:var(--accent);box-shadow:0 0 5px var(--accent)}
.chan-l{font-size:9px;color:#49EACB;letter-spacing:.06em;margin-left:4px;opacity:.8}
.chan-r{font-size:9px;color:#f060c0;letter-spacing:.06em;margin-left:4px;opacity:.8}

/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;
  padding:4px 9px;border-radius:3px;font-size:11px;font-weight:700;
  border:1px solid var(--border);background:rgba(255,255,255,.05);color:var(--text);
  transition:background .1s;white-space:nowrap;line-height:1}
.btn:hover{background:rgba(255,255,255,.10)}
.btn.active,.btn.on{background:rgba(73,234,203,.14);border-color:rgba(73,234,203,.45);color:var(--accent)}
.btnRow{display:flex;gap:3px;margin-bottom:5px}
.btnRow .btn{flex:1;padding:3px 2px;font-size:10px}
#btnPlay{padding:6px 16px;background:rgba(73,234,203,.12);border-color:rgba(73,234,203,.4);
  color:var(--accent);font-size:13px;font-weight:900;letter-spacing:.06em}
#btnPlay.playing{background:rgba(220,60,60,.14);border-color:rgba(220,80,80,.45);color:#f87070}

/* sliders */
.sr{display:flex;align-items:center;gap:5px;margin-bottom:4px;overflow:visible}
.sr label{font-size:10px;color:var(--muted);width:30px;flex-shrink:0;font-family:var(--mono)}
.sr .v{font-size:10px;color:var(--accent);width:40px;min-width:40px;text-align:right;font-family:var(--mono);flex-shrink:0}
input[type=range]{-webkit-appearance:none;flex:1;height:3px;background:rgba(255,255,255,.12);
  border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;
  border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 4px rgba(73,234,203,.5)}
input[type=range].pur::-webkit-slider-thumb{background:var(--purple);box-shadow:0 0 4px rgba(155,89,182,.5)}
input[type=range]::-moz-range-thumb{width:11px;height:11px;border-radius:50%;background:var(--accent);border:none}
.sr input[type=number].v{border:none;background:transparent;outline:none;-moz-appearance:textfield;padding:0;min-width:60px;width:60px}
.sr input[type=number].v::-webkit-inner-spin-button,.sr input[type=number].v::-webkit-outer-spin-button{-webkit-appearance:none}
.bpmBox{width:46px;background:rgba(255,255,255,.05);border:1px solid var(--border);
  color:var(--text);font-family:var(--mono);font-size:13px;font-weight:700;
  text-align:center;padding:3px 4px;border-radius:3px;-moz-appearance:textfield}
/* vu */
.vuWrap{height:5px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-top:5px}
.vuBar{height:100%;background:linear-gradient(90deg,var(--accent) 0%,#f0c060 70%,#f06060 100%);width:0%}

/* knobs */
.knobWrap{display:flex;flex-direction:column;align-items:center;gap:1px;cursor:ns-resize;user-select:none}
.knobWrap canvas{display:block}
.knobLabel{font-size:10px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em}
.knobVal{font-size:10px;color:var(--accent);font-family:var(--mono)}

/* recording */
.btn.recording{background:rgba(220,60,60,.2);border-color:rgba(220,80,80,.5);color:#f07070}
#recOverlay{display:none;position:absolute;top:16px;right:16px;
  font-size:13px;font-weight:700;color:#f07070;font-family:var(--mono);letter-spacing:.06em}
#recOverlay.show{display:block}
</style>

      <div class="sr"><label>DET</label><input type="range" id="dt1" min="-1200" max="1200" step="0.1" value="0"><span class="v" id="dv1">0.0¢</span></div>
      <div class="sr"><label>PHS</label><input type="range" id="ph1" min="0" max="6.2832" step="0.001" value="1.5708"><span class="v" id="phv1">1.57</span></div>

    <div class="card" id="oscCard3">

<script>
(() => {
"use strict";

const TAU = Math.PI * 2;
const clamp = (x,a,b) => Math.max(a, Math.min(b, x));
// Frequency slider: 0–20 000 Hz.  Bottom 1% is linear 0–20 Hz,
// rest is logarithmic 20–20 000 Hz so musical intervals stay even.
const _LZ = 0.01;
const logF = v => {
  v = clamp(v, 0, 1);
  if (v <= _LZ) return (v / _LZ) * 20;
  return 20 * Math.pow(1000, (v - _LZ) / (1 - _LZ));
};
const freqToSlider = hz => {
  if (hz <= 0) return 0;
  if (hz <= 20) return clamp((hz / 20) * _LZ, 0, _LZ);
  return clamp(_LZ + (1 - _LZ) * Math.log(hz / 20) / Math.log(1000), 0, 1);
};

// gcd / small-integer ratio helpers — used to lock the Lissajous render window
// to the actual closed-period of the freq pair, and to display p:q ratio.
function gcdInt(a, b) { a = Math.abs(a|0); b = Math.abs(b|0); while (b) { [a,b] = [b, a%b]; } return a || 1; }
function approxRatio(a, b, maxDen = 32) {
  if (!(a > 0) || !(b > 0)) return null;
  const r = a / b;
  let best = { p: 1, q: 1, err: Infinity };
  for (let q = 1; q <= maxDen; q++) {
    const p = Math.round(r * q);
    if (!p) continue;
    const err = Math.abs(r - p / q);
    if (err < best.err) best = { p, q, err };
    if (err < 1e-4) break;
  }
  return best;
}

/* ── STATE ── */
let actx = null, playing = false;

const oState = [
  { wave:"sine", freq:0.340000, det:0, vol:.1, on:true, pan:-1, phase:0 },
  { wave:"sine", freq:0.398110, det:0, vol:.1, on:true, pan:+1, phase:1.5708 },
  { wave:"sine", freq:0.439340, det:0, vol:.1, on:true, pan:-1, phase:0 },
  { wave:"sine", freq:0.497450, det:0, vol:.1, on:true, pan:+1, phase:1.5708 },
];
let masterVol = 0.70;

let nd = null;
/* ── BUILD AUDIO GRAPH ── */
function buildAudio() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === "suspended") actx.resume();
  teardownAudio();

  const analyserF = actx.createAnalyser(); analyserF.fftSize = 2048;
  const fftBuf  = new Uint8Array(analyserF.frequencyBinCount);

  const oscs = oState.map(s => {
    const o = actx.createOscillator();
    o.type = s.wave;
    o.frequency.value = logF(s.freq);
    o.detune.value = s.det;
    const g = actx.createGain(); g.gain.value = s.on ? s.vol : 0;
    const pan = actx.createStereoPanner(); pan.pan.value = s.pan;
    o.connect(g); g.connect(pan);
    return { o, g, pan };
  });

  const t = actx.currentTime + 0.01;
  oscs.forEach(n => n.o.start(t));

  const masterG = actx.createGain(); masterG.gain.value = masterVol;
  oscs.forEach(n => n.pan.connect(masterG));

  masterG.connect(analyserF);

  // ── OUTPUT SAFETY ─────────────────────────────────────────────────────
  // Four summed oscillators at user-set levels can exceed 0 dBFS and hit the
  // speakers as a hard-clipped burst. Guarantee a safe ceiling: a sample-
  // accurate tanh soft-clip (hard-clamps at ±1, transparent below) followed
  // by a brick-wall limiter that catches sustained peaks before the clip.
  const safeCurve = (() => {
    const N = 2048, c = new Float32Array(N), k = 1.6;
    for (let i = 0; i < N; i++){ const x = (i * 2 / (N - 1)) - 1; c[i] = Math.tanh(x * k) / Math.tanh(k); }
    return c;
  })();
  const safeClip = actx.createWaveShaper();
  safeClip.curve = safeCurve; safeClip.oversample = '2x';
  const limiter = actx.createDynamicsCompressor();
  limiter.threshold.value = -3; limiter.knee.value = 0;
  limiter.ratio.value = 20; limiter.attack.value = 0.002; limiter.release.value = 0.10;
  analyserF.connect(safeClip);
  safeClip.connect(limiter);
  limiter.connect(actx.destination);

  const analyserL = actx.createAnalyser(); analyserL.fftSize = 2048;
  const analyserR = actx.createAnalyser(); analyserR.fftSize = 2048;
  const scopeBufL = new Float32Array(analyserL.fftSize);
  const scopeBufR = new Float32Array(analyserR.fftSize);
  oscs[0].g.connect(analyserL);
  oscs[2].g.connect(analyserL);
  oscs[1].g.connect(analyserR);
  oscs[3].g.connect(analyserR);

  nd = { oscs, masterG, analyserF, fftBuf,
         analyserL, analyserR, scopeBufL, scopeBufR };
}

function restartOsc(i) {
  if (!nd) return;
  const s = oState[i];
  const { g } = nd.oscs[i];
  try { nd.oscs[i].o.stop(); nd.oscs[i].o.disconnect(); } catch(e) {}
  const o = actx.createOscillator();
  o.type = s.wave;
  o.frequency.value = logF(s.freq);
  o.detune.value = s.det;
  o.connect(g);
  o.start(actx.currentTime + 0.005);
  nd.oscs[i].o = o;
}

function teardownAudio() {
  if (!nd) return;
  try { nd.oscs.forEach(n => { n.o.stop(); n.o.disconnect(); n.g.disconnect(); n.pan.disconnect(); }); } catch{}
  nd = null;
}

function ensureNd() {
  if (!actx) buildAudio();
  if (!nd) buildAudio();
}

/* ── KNOB GLOBALS ── */
let decayVal  = 0.08;
let brightVal = 70;
let thickVal  = 2.5;

/* ── COLOR ENGINE STATE ── */
let ceHue = 165, ceSpan = 0, ceSat = 85, ceBrt = 70;
let ceGlow = 0.15, ceSpeed = 0, cePhase = 0;

/* ── KNOB COMPONENT ── */
function makeKnob({ canvasId, wrapId, valId, min, max, defaultVal, decimals, unit, onChange }) {
  const cv   = document.getElementById(canvasId);
  const wrap = document.getElementById(wrapId);
  const valEl = document.getElementById(valId);
  const ctx  = cv.getContext("2d");
  const SIZE = cv.width;
  const CX = SIZE / 2, CY = SIZE / 2, R = SIZE * 0.38;
  const START = Math.PI * 0.75;   // 135°
  const END   = Math.PI * 2.25;   // 405° (270° sweep)
  const RANGE = END - START;
  let val = defaultVal;

  function draw() {
    ctx.clearRect(0, 0, SIZE, SIZE);
    const norm = (val - min) / (max - min);
    const angle = START + norm * RANGE;

    // track bg
    ctx.beginPath();
    ctx.arc(CX, CY, R, START, END);
    ctx.strokeStyle = "rgba(255,255,255,0.10)";
    ctx.lineWidth = 3.5;
    ctx.lineCap = "round";
    ctx.stroke();

    // active arc
    ctx.beginPath();
    ctx.arc(CX, CY, R, START, angle);
    ctx.strokeStyle = "#1D9E75";
    ctx.lineWidth = 3.5;
    ctx.lineCap = "round";
    ctx.stroke();

    // dot
    const dx = CX + R * Math.cos(angle);
    const dy = CY + R * Math.sin(angle);
    ctx.beginPath();
    ctx.arc(dx, dy, 3, 0, Math.PI * 2);
    ctx.fillStyle = "#1D9E75";
    ctx.fill();
  }

  function fmt(v) {
    const s = v.toFixed(decimals);
    return unit ? s + unit : s;
  }

  function set(v) {
    val = Math.max(min, Math.min(max, v));
    draw();
    valEl.textContent = fmt(val);
    onChange(val);
  }

  draw();
  valEl.textContent = fmt(val);

  // drag
  let dragY = null;
  wrap.addEventListener("mousedown", e => { dragY = e.clientY; e.preventDefault(); });
  window.addEventListener("mousemove", e => {
    if (dragY === null) return;
    const dy = dragY - e.clientY; // up = increase
    dragY = e.clientY;
    set(val + dy * (max - min) / 500);
  });
  window.addEventListener("mouseup", () => { dragY = null; });

  // wheel
  wrap.addEventListener("wheel", e => {
    e.preventDefault();
    const dir = e.deltaY < 0 ? 1 : -1;
    set(val + dir * (max - min) / 300);
  }, { passive: false });

  return { set };
}

makeKnob({ canvasId:"knobDecay",  wrapId:"knobDecayWrap",  valId:"knobDecayVal",
  min:0.001, max:0.60, defaultVal:0.05, decimals:3, unit:"",
  onChange: v => { decayVal = v; } });

makeKnob({ canvasId:"knobBright", wrapId:"knobBrightWrap", valId:"knobBrightVal",
  min:10,   max:100,  defaultVal:70,   decimals:0, unit:"%",
  onChange: v => { brightVal = Math.round(v); } });

makeKnob({ canvasId:"knobThick",  wrapId:"knobThickWrap",  valId:"knobThickVal",
  min:0.001, max:8.0,  defaultVal:2.5,  decimals:3, unit:"",
  onChange: v => { thickVal = v; } });

/* ── VISUALIZATION (Lissajous) ── */
const canvas = document.getElementById("vizCanvas");
const ctx2d  = canvas.getContext("2d");
let lissT = 0, vizZoom = 1.0;
let canvasSize = 600, canvasDpr = 1;
let fpsAvg = 60, fpsFrames = 0, fpsT = performance.now();

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const c = document.getElementById('center');
  const size = Math.min(c.clientWidth, c.clientHeight);
  canvas.width  = size * dpr;
  canvas.height = size * dpr;
  canvas.style.width  = size + 'px';
  canvas.style.height = size + 'px';
}

function readEnv() {
  if (!nd) return { level:0, bass:0, mid:0, hi:0 };
  nd.analyserF.getByteFrequencyData(nd.fftBuf);
  const N = nd.fftBuf.length;
  const band=(a,b) => {
    let s=0,c=0;
    for(let i=Math.floor(a*N);i<=Math.floor(b*N);i++){s+=nd.fftBuf[i];c++;}
    return c ? s/c/255 : 0;
  };
  return { level:band(0,.9), bass:band(0,.08), mid:band(.08,.3), hi:band(.3,.9) };
}

function drawViz(now) {
  fpsFrames++;
  if (now-fpsT > 500) { fpsAvg = fpsAvg*.7+(fpsFrames*1000/(now-fpsT))*.3; fpsFrames=0; fpsT=now; }

  const W = canvas.width, H = canvas.height, cx=W/2, cy=H/2;
  const env = readEnv();

  ctx2d.globalCompositeOperation = "source-over";
  ctx2d.globalAlpha = 1;
  const decayAlpha = decayVal * (1 + .75*env.bass);
  ctx2d.fillStyle = `rgba(5,13,9,${decayAlpha})`;
  ctx2d.fillRect(0, 0, W, H);

  const oscs = oState.map(s => ({
    on:    s.on,
    hz:    logF(s.freq) * Math.pow(2, s.det / 1200),
    wave:  s.wave,
    phase: s.phase,
    vol:   s.vol,
  }));
  const sample = (o, t) => {
    if (!o.on) return 0;
    const arg = TAU * o.hz * t + o.phase;
    return o.wave === 'triangle'
      ? o.vol * (Math.sin(arg) + 0.33 * Math.sin(3 * arg))
      : o.vol * Math.sin(arg);
  };

  const xVol = (oscs[0].on?oscs[0].vol:0) + (oscs[2].on?oscs[2].vol:0);
  const yVol = (oscs[1].on?oscs[1].vol:0) + (oscs[3].on?oscs[3].vol:0);
  const xNorm = xVol > 0 ? 1 / xVol : 0;
  const yNorm = yVol > 0 ? 1 / yVol : 0;

  const xFreqs = [oscs[0], oscs[2]].filter(o => o.on && o.hz > 0).map(o => o.hz);
  const yFreqs = [oscs[1], oscs[3]].filter(o => o.on && o.hz > 0).map(o => o.hz);
  const allFreqs = [...xFreqs, ...yFreqs];

  function lissajousPeriod(freqs) {
    if (!freqs.length) return 0.1;
    if (freqs.length === 1) return 4 / freqs[0];
    const ints = freqs.map(f => Math.max(1, Math.round(f * 100)));
    const g = ints.reduce(gcdInt);
    const fundamental = g / 100;
    return Math.min(2.0, 1 / fundamental);
  }
  const windowT = lissajousPeriod(allFreqs);
  lissT += 0.016;

  const R = Math.min(W,H) * (0.36 + .12*env.level) * vizZoom;
  const steps = 8000;

  // precompute points
  const pts = new Array(steps + 1);
  for (let i = 0; i <= steps; i++) {
    const t = lissT + (i / steps) * windowT;
    const xVal = (sample(oscs[0], t) + sample(oscs[2], t)) * xNorm;
    const yVal = (sample(oscs[1], t) + sample(oscs[3], t)) * yNorm;
    pts[i] = { x: cx + R * xVal, y: cy + R * yVal };
  }

  // color engine
  cePhase = (cePhase + ceSpeed * 0.016) % 360;
  const baseHue = (ceHue + cePhase) % 360;
  const lightness = Math.round(ceBrt * 0.8);
  const bright = clamp(.7 + .3*env.level, .5, 1);
  const lw = thickVal + env.bass*3;

  ctx2d.globalCompositeOperation = "source-over";

  if (ceSpan < 1) {
    const p = new Path2D();
    for (let i = 0; i <= steps; i++) i ? p.lineTo(pts[i].x, pts[i].y) : p.moveTo(pts[i].x, pts[i].y);
    ctx2d.strokeStyle = `hsla(${baseHue},${ceSat}%,${lightness}%,${ceGlow})`;
    ctx2d.lineWidth = lw * 2.5;
    ctx2d.stroke(p);
    ctx2d.strokeStyle = `hsla(${baseHue},${ceSat}%,${lightness}%,${bright})`;
    ctx2d.lineWidth = lw;
    ctx2d.stroke(p);
  } else {
    const SEGS = 64;
    const segLen = Math.ceil(steps / SEGS);
    for (let s = 0; s < SEGS; s++) {
      const from = s * segLen;
      const to = Math.min(from + segLen, steps);
      const p = new Path2D();
      for (let i = from; i <= to; i++) i === from ? p.moveTo(pts[i].x, pts[i].y) : p.lineTo(pts[i].x, pts[i].y);
      const h = (baseHue + (s / SEGS) * ceSpan) % 360;
      ctx2d.strokeStyle = `hsla(${h},${ceSat}%,${lightness}%,${ceGlow})`;
      ctx2d.lineWidth = lw * 2.5;
      ctx2d.stroke(p);
      ctx2d.strokeStyle = `hsla(${h},${ceSat}%,${lightness}%,${bright})`;
      ctx2d.lineWidth = lw;
      ctx2d.stroke(p);
    }
  }

  document.getElementById("vuBar").style.width = clamp(env.level*110,0,100)+"%";

  const fmtHz = hz => hz >= 1000 ? (hz/1000).toFixed(2)+'k' : hz.toFixed(1);
  const oscTxt = oscs.map((o, i) => `${i+1}:${o.on ? fmtHz(o.hz) : '—'}`).join(' ');
  const ratio = approxRatio(oscs[0].hz, oscs[1].hz);
  const rTxt  = (oscs[0].on && oscs[1].on && ratio) ? `${ratio.p}:${ratio.q}` : '—';
  const fb = `${oscTxt}  ratio ${rTxt}`;
  document.getElementById("statusBar").textContent = playing
    ? `▶ ${fb}  fps:${fpsAvg.toFixed(0)}`
    : `— stopped — ${fb}`;

  if (activeOffCtx && activeOffscreen) {
    activeOffCtx.drawImage(canvas, 0, 0, 1440, 1440);
  }
}

/* ── RENDER LOOP ── */
function tick(now) {
  drawViz(now);
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

/* ── TRANSPORT ── */
function togglePlay() {
  if (!playing) {
    ensureNd();
    playing = true;
    document.getElementById("btnPlay").textContent = "■ STOP";
    document.getElementById("btnPlay").classList.add("playing");
  } else {
    playing = false;
    document.getElementById("btnPlay").textContent = "▶ PLAY";
    document.getElementById("btnPlay").classList.remove("playing");
  }
}
document.getElementById("btnPlay").addEventListener("click", togglePlay);
document.getElementById("masterVol").addEventListener("input", e => {
  masterVol = parseFloat(e.target.value);

});

/* ── OSC CONTROLS (all 4) ── */
for (let i=0;i<4;i++) {
  (n => {
    // waveform (SIN / TRI only)
    document.getElementById("wave"+n).querySelectorAll("[data-w]").forEach(b => {
      b.addEventListener("click", () => {
        document.getElementById("wave"+n).querySelectorAll(".btn").forEach(x=>x.classList.remove("active"));
        b.classList.add("active");
        oState[n].wave = b.dataset.w;
        if (nd) restartOsc(n);
      });
    });
    // freq — two-way binding: slider (log 20–20 000 Hz) ↔ number input (Hz)
    const fe=document.getElementById("fr"+n), fv=document.getElementById("fv"+n);
    fv.value = logF(oState[n].freq).toFixed(2);
    fe.addEventListener("input", () => {
      oState[n].freq = parseFloat(fe.value);
      const hz = logF(oState[n].freq);
      fv.value = hz.toFixed(2);
      if (nd) nd.oscs[n].o.frequency.setTargetAtTime(hz, actx.currentTime, .015);
    });
    fv.addEventListener("input", () => {
      const hz = clamp(parseFloat(fv.value) || 0, 0, 20000);
      oState[n].freq = freqToSlider(hz);
      fe.value = oState[n].freq; // programmatic .value doesn't fire 'input'
      if (nd) nd.oscs[n].o.frequency.setTargetAtTime(hz, actx.currentTime, .015);
    });
    // phase
    const pe=document.getElementById("ph"+n), pv=document.getElementById("phv"+n);
    pe.addEventListener("input", () => {
      oState[n].phase = parseFloat(pe.value);
      pv.textContent = oState[n].phase.toFixed(2);
    });
    // detune
    const de=document.getElementById("dt"+n), dv=document.getElementById("dv"+n);
    de.addEventListener("input", () => {
      oState[n].det=parseFloat(de.value); dv.textContent=oState[n].det.toFixed(1)+"¢";
      if (nd) nd.oscs[n].o.detune.value=oState[n].det;
    });
    // vol
    const ve=document.getElementById("vl"+n), vv=document.getElementById("vv"+n);
    ve.addEventListener("input", () => {
      oState[n].vol=parseFloat(ve.value); vv.textContent=oState[n].vol.toFixed(2);
      if (nd && oState[n].on) nd.oscs[n].g.gain.setTargetAtTime(oState[n].vol, actx.currentTime, .01);
    });
    // on/off
    document.getElementById("on"+n).addEventListener("click", () => {
      oState[n].on = !oState[n].on;
      const b=document.getElementById("on"+n);
      b.textContent = oState[n].on?"ON":"OFF";
      b.classList.toggle("on", oState[n].on);
      document.getElementById("led"+n).classList.toggle("on", oState[n].on);
      if (nd) nd.oscs[n].g.gain.value = oState[n].on ? oState[n].vol : 0;
    });
  })(i);
}

(()=>{

    const el = document.getElementById(id), vEl = document.getElementById(valId);

  bind("ceSpan", "ceSpanV", ()=>ceSpan, v=>{ceSpan=Math.round(v);},  v=>v+"°");
  bind("ceSat",  "ceSatV",  ()=>ceSat,  v=>{ceSat=Math.round(v);},   v=>v+"%");
  bind("ceBrt",  "ceBrtV",  ()=>ceBrt,  v=>{ceBrt=Math.round(v);},   v=>v+"%");
  bind("ceGlow", "ceGlowV", ()=>ceGlow, v=>{ceGlow=v;},              v=>v.toFixed(2));
  bind("ceSpeed","ceSpeedV",()=>ceSpeed,v=>{ceSpeed=Math.round(v);},  v=>v+"°/s");
})();

/* ── KEYBOARD ── */
window.addEventListener("keydown", async e => {
  if (e.target.tagName==="INPUT") return;
  const k = e.key;
  if (k===" "){e.preventDefault();togglePlay();}
  if (k==="1") document.getElementById("on0").click();
  if (k==="2") document.getElementById("on1").click();
  if (k==="3") document.getElementById("on2").click();
  if (k==="4") document.getElementById("on3").click();
  if (k==="a"||k==="A"){ensureNd();}
  if (k==="z"||k==="Z"){
    for(let i=0;i<4;i++){
      const el=document.getElementById("fr"+i);
      el.value=Math.random().toFixed(3);
      el.dispatchEvent(new Event("input"));
    }
  }
});

/* ── PixelLab interface: publish / remix / rehydrate ── */
function captureState() {
  const osc = [];
  for (let i = 0; i < 4; i++) {
    const active = document.querySelector("#wave" + i + " .btn.active");
    osc.push({
      wave: active ? active.dataset.w : "sine",
      fr: document.getElementById("fr" + i).value,
      ph: document.getElementById("ph" + i).value,
      dt: document.getElementById("dt" + i).value,
      vl: document.getElementById("vl" + i).value,
      on: document.getElementById("on" + i).classList.contains("on")
    });
  }
  const ce = {};
  ["ceHue","ceSpan","ceSat","ceBrt","ceGlow","ceSpeed"].forEach(id => {
    ce[id] = document.getElementById(id).value;
  });
  return { v: 1, osc, ce, vol: document.getElementById("masterVol").value };
}

function restoreState(p) {
  if (!p || !Array.isArray(p.osc)) return;
  const setInput = (id, val) => {
    if (val == null) return;
    const el = document.getElementById(id);
    if (!el) return;
    el.value = val;
    el.dispatchEvent(new Event("input"));
  };
  p.osc.forEach((o, i) => {
    if (i > 3 || !o) return;
    const wrap = document.getElementById("wave" + i);
    const tgt = wrap.querySelector('[data-w="' + o.wave + '"]');
    const cur = wrap.querySelector(".btn.active");
    if (tgt && tgt !== cur) tgt.click();
    setInput("fr" + i, o.fr);
    setInput("ph" + i, o.ph);
    setInput("dt" + i, o.dt);
    setInput("vl" + i, o.vl);
    const onBtn = document.getElementById("on" + i);
    if (onBtn.classList.contains("on") !== !!o.on) onBtn.click();
  });
  if (p.ce) Object.keys(p.ce).forEach(id => setInput(id, p.ce[id]));
  if (p.vol != null) setInput("masterVol", p.vol);
}

if (window.PixelGallery) {

    labUrl: "/synthi/visual-engine.html",

    publishButtonId: "btnPublish",
    captureState: captureState,
    restoreState: restoreState,
    renderThumbnail: () => canvas.toDataURL("image/png")
  });
}

/* ── OFFSCREEN RECORD (6s) ── */
const REC_DURATION = 5000;
let isRecording = false;
let activeOffCtx = null;
let activeOffscreen = null;
const recOverlay = document.getElementById('recOverlay');
const btnRec = document.getElementById('btnRec');
const btnRecShare = document.getElementById('btnRecShare');
let recMode = 'download';

btnRec.addEventListener('click', () => { recMode = 'download'; beginRec(); });
btnRecShare.addEventListener('click', () => { recMode = 'share'; beginRec(); });

function beginRec() {
  if (isRecording) return;
  isRecording = true;
  btnRec.classList.add('recording');
  btnRec.textContent = '● REC';
  btnRec.disabled = true;
  btnRecShare.disabled = true;

  const chunks = [];
  const off = document.createElement('canvas');
  off.width = 1440; off.height = 1440;
  activeOffscreen = off;
  activeOffCtx = off.getContext('2d');

  const stream = off.captureStream(60);

  const FORMATS = [
    'video/mp4;codecs=avc1.42E01E',
    'video/mp4;codecs=h264',
    'video/webm;codecs=vp9',
    'video/webm',
  ];
  let rec;
  for (const mime of FORMATS) {
    if (!MediaRecorder.isTypeSupported(mime)) continue;
    try { rec = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 25_000_000 }); break; }
    catch(e) {}
  }
  if (!rec) rec = new MediaRecorder(stream, { videoBitsPerSecond: 25_000_000 });

  const actualMime = rec.mimeType || 'video/webm';
  const actualExt  = actualMime.includes('mp4') ? 'mp4' : 'webm';

  rec.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  rec.onstop = () => {
    const blob = new Blob(chunks, { type: actualMime });
    const filename = 'synthi-lissajous-' + Date.now() + '.' + actualExt;
    if (recMode === 'share' && window.PixelShare) {
      PixelShare.share({
        file: new File([blob], filename, { type: actualMime }),
        filenamePrefix: 'synthi-lissajous',
        text: 'SYNTHI Visual Engine — 4-oscillator Lissajous clip, made in the Pixel on Kaspa art lab. Make your own:',
        url: 'https://pixel-on-kaspa.fyi/synthi/visual-engine.html',
        hashtags: ['creativecoding', 'synthesizer']
      });
    } else {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click();
      setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 3000);
    }
    endRec();
  };

  rec.start(100);

  const start = performance.now();
  function updateOverlay() {
    const elapsed = performance.now() - start;
    const remaining = Math.ceil((REC_DURATION - elapsed) / 1000);
    if (elapsed >= REC_DURATION) {
      recOverlay.classList.remove('show');
      recOverlay.textContent = '';
      rec.stop();
      return;
    }
    recOverlay.classList.add('show');
    recOverlay.textContent = remaining > 0 ? '● REC ' + remaining : '● REC';
    requestAnimationFrame(updateOverlay);
  }
  requestAnimationFrame(updateOverlay);
}

function endRec() {
  isRecording = false;
  activeOffCtx = null;
  activeOffscreen = null;
  btnRec.classList.remove('recording');
  btnRec.textContent = '⏺ MP4';
  btnRec.disabled = false;
  btnRecShare.disabled = false;
}

})();
