<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SYNTHI RECORDS — REC ARCHIVE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0a0a;
      --panel:   #111111;
      --panel2:  #161616;
      --border:  rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.14);
      --red:     #e63b3b;
      --amber:   #e8a020;
      --green:   #2de879;
      --text:    #e4e4e4;
      --muted:   rgba(228,228,228,0.50);
      --dim:     rgba(228,228,228,0.28);
      --f-disp:  'Bebas Neue', sans-serif;
      --f-mono:  'Share Tech Mono', monospace;
      --f-ui:    'Space Mono', monospace;
      --bar-h:   52px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--f-ui);
    }

    body { display: flex; flex-direction: column; }

    /* ── CRT OVERLAY ── */
    #crt {
      position: fixed; inset: 0;
      z-index: 999;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.06) 2px,
        rgba(0,0,0,0.06) 4px
      );
    }

    /* ── TOPBAR ── */
    #topbar {
      height: var(--bar-h);
      min-height: var(--bar-h);
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      gap: 14px;
      z-index: 100;
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .brand img {
      width: 28px; height: 28px;
      border-radius: 5px;
      display: block;
    }
    .brand-name {
      font-family: var(--f-disp);
      font-size: 24px;
      letter-spacing: 0.14em;
      color: var(--text);
      line-height: 1;
    }
    .rec-badge {
      font-family: var(--f-mono);
      font-size: 10px;
      color: var(--red);
      background: rgba(230,59,59,0.12);
      border: 1px solid rgba(230,59,59,0.38);
      border-radius: 3px;
      padding: 2px 7px;
      letter-spacing: 0.12em;
      animation: rec-blink 1.4s ease-in-out infinite;
    }
    @keyframes rec-blink {
      0%, 42%, 58%, 100% { opacity: 1; }
      50% { opacity: 0.1; }
    }

    .topnav {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .topnav a {
      font-family: var(--f-mono);
      font-size: 11px;
      color: var(--muted);
      text-decoration: none;
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: 3px;
      letter-spacing: 0.06em;
      transition: color .15s, border-color .15s, background .15s;
      white-space: nowrap;
    }
    .topnav a:hover {
      color: var(--text);
      border-color: var(--border2);
      background: rgba(255,255,255,0.04);
    }

    /* ── MAIN GRID ── */
    #main {
      flex: 1;
      overflow: hidden;
      display: grid;
      grid-template-columns: 280px 1fr;
    }

    /* ── SIDEBAR ── */
    #sidebar {
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-hdr {
      flex-shrink: 0;
      padding: 10px 14px 8px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sidebar-hdr-label {
      font-family: var(--f-mono);
      font-size: 9px;
      color: var(--dim);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .sidebar-hdr-count {
      font-family: var(--f-mono);
      font-size: 9px;
      color: var(--dim);
      letter-spacing: 0.1em;
    }
    #stream-list {
      overflow-y: auto;
      overflow-x: hidden;
      flex: 1;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.08) transparent;
    }
    #stream-list::-webkit-scrollbar { width: 3px; }
    #stream-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }

    .stream-item {
      border-bottom: 1px solid var(--border);
      border-left: 3px solid transparent;
      padding: 11px 14px 10px;
      cursor: pointer;
      transition: background .15s;
    }
    .stream-item:hover { background: rgba(255,255,255,0.025); }
    .stream-item.active {
      border-left-color: var(--red);
      background: rgba(230,59,59,0.05);
    }

    .si-top {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 4px;
    }
    .si-num {
      font-family: var(--f-disp);
      font-size: 22px;
      line-height: 1;
      color: var(--dim);
      min-width: 30px;
      flex-shrink: 0;
    }
    .stream-item.active .si-num { color: var(--red); }
    .si-name {
      font-family: var(--f-disp);
      font-size: 15px;
      letter-spacing: 0.07em;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    .si-meta {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 7px;
    }
    .si-date {
      font-family: var(--f-mono);
      font-size: 9px;
      color: var(--dim);
    }
    .si-dur {
      font-family: var(--f-mono);
      font-size: 9px;
      color: var(--amber);
    }
    .si-clip {
      margin-left: auto;
      font-family: var(--f-mono);
      font-size: 8px;
      color: var(--green);
      background: rgba(45,232,121,0.08);
      border: 1px solid rgba(45,232,121,0.25);
      border-radius: 2px;
      padding: 1px 5px;
      letter-spacing: 0.1em;
    }

    .vu-row {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 16px;
    }
    .vu-bar {
      width: 4px;
      border-radius: 1px;
      background: rgba(232,160,32,0.35);
      animation: vu-anim var(--d,0.8s) ease-in-out infinite alternate;
      animation-delay: var(--dl,0s);
    }
    .stream-item.active .vu-bar {
      background: rgba(230,59,59,0.8);
    }
    @keyframes vu-anim {
      0%   { height: var(--a,3px); }
      25%  { height: var(--b,10px); }
      50%  { height: var(--c,5px); }
      75%  { height: var(--e,13px); }
      100% { height: var(--f,4px); }
    }

    /* ── CONTENT ── */
    #content {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    /* Player header */
    #player-hdr {
      flex-shrink: 0;
      height: var(--bar-h);
      background: var(--panel2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      gap: 12px;
    }
    .now-playing {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .tape-icon {
      font-size: 18px;
      flex-shrink: 0;
      opacity: 0.7;
    }
    .np-inner { min-width: 0; }
    .np-label {
      font-family: var(--f-mono);
      font-size: 8px;
      color: var(--dim);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 1px;
    }
    .np-title {
      font-family: var(--f-disp);
      font-size: 19px;
      letter-spacing: 0.1em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .transport {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }
    .tbtn {
      font-family: var(--f-mono);
      font-size: 10px;
      color: var(--muted);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 6px 10px;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: color .15s, border-color .15s, background .15s;
      white-space: nowrap;
      line-height: 1;
    }
    .tbtn:hover {
      color: var(--text);
      border-color: var(--border2);
      background: rgba(255,255,255,0.04);
    }
    .tbtn.is-play {
      color: var(--green);
      border-color: rgba(45,232,121,0.35);
      background: rgba(45,232,121,0.06);
    }
    .tbtn.is-play:hover { background: rgba(45,232,121,0.12); }
    .tbtn.is-pump {
      color: var(--amber);
      border-color: rgba(232,160,32,0.35);
      background: rgba(232,160,32,0.06);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }
    .tbtn.is-pump:hover { background: rgba(232,160,32,0.12); }

    /* Video area */
    #video-area {
      flex: 1;
      background: #000;
      position: relative;
      overflow: hidden;
    }
    #video-area iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
    #placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .ph-icon {
      font-size: 36px;
      opacity: 0.2;
    }
    .ph-text {
      font-family: var(--f-mono);
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    /* Statusbar */
    #statusbar {
      flex-shrink: 0;
      height: 36px;
      background: var(--panel);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 14px;
      overflow: hidden;
    }
    .waveform {
      display: flex;
      align-items: center;
      gap: 2px;
      height: 22px;
      flex-shrink: 0;
    }
    .wf-bar {
      width: 3px;
      border-radius: 1px;
      background: var(--red);
      opacity: 0.65;
      animation: wf-anim var(--d,0.55s) ease-in-out infinite alternate;
      animation-delay: var(--dl,0s);
    }
    @keyframes wf-anim {
      0%   { height: var(--a,3px); }
      33%  { height: var(--b,14px); }
      66%  { height: var(--c,7px); }
      100% { height: var(--e,18px); }
    }

    .stags {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      overflow: hidden;
    }
    .stag {
      font-family: var(--f-mono);
      font-size: 9px;
      color: var(--dim);
      letter-spacing: 0.09em;
      white-space: nowrap;
    }
    .stag b { color: var(--amber); font-weight: normal; }
    .ssep {
      color: var(--border2);
      font-size: 10px;
      flex-shrink: 0;
    }

    .stimer {
      font-family: var(--f-mono);
      font-size: 12px;
      color: var(--green);
      letter-spacing: 0.12em;
      flex-shrink: 0;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      #sidebar { display: none; }
      #main { grid-template-columns: 1fr; }
      .np-title { font-size: 15px; }
    }
  </style>
</head>
<body>

<div id="crt"></div>

<!-- TOPBAR -->
<div id="topbar">
  <div class="brand">
    <img src="../assets/img/logo.png" alt="SYNTHI" />
    <span class="brand-name">SYNTHI •</span>
    <span class="rec-badge">● REC</span>
  </div>
  <nav class="topnav">
    <a href="/">Home</a>
    <a href="index.html">Index</a>
    <a href="https://x.com/PixelonKas" target="_blank" rel="noreferrer">X</a>
    <a href="https://t.me/+Ro2t1MjZunIxM2M8" target="_blank" rel="noreferrer">TG</a>
  </nav>
</div>

<!-- MAIN -->
<div id="main">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-hdr">
      <span class="sidebar-hdr-label">Archive</span>
      <span class="sidebar-hdr-count" id="stream-count">—</span>
    </div>
    <div id="stream-list"></div>
  </div>

  <!-- CONTENT -->
  <div id="content">

    <!-- Player header -->
    <div id="player-hdr">
      <div class="now-playing">
        <span class="tape-icon">🎞</span>
        <div class="np-inner">
          <div class="np-label">Now Playing</div>
          <div class="np-title" id="np-title">—</div>
        </div>
      </div>
      <div class="transport">
        <button class="tbtn" id="btn-prev">◀◀</button>
        <button class="tbtn is-play" id="btn-play">▶ PLAY</button>
        <button class="tbtn" id="btn-next">▶▶</button>
        <a class="tbtn is-pump" id="btn-pump" href="#" target="_blank" rel="noreferrer">pump.fun ↗</a>
      </div>
    </div>

    <!-- Video -->
    <div id="video-area">
      <div id="placeholder">
        <div class="ph-icon">⏺</div>
        <div class="ph-text">No stream loaded</div>
      </div>
    </div>

    <!-- Statusbar -->
    <div id="statusbar">
      <div class="waveform" id="waveform"></div>
      <div class="stags">
        <span class="stag">FORMAT <b id="tag-format">—</b></span>
        <span class="ssep">│</span>
        <span class="stag">SRC <b id="tag-src">—</b></span>
        <span class="ssep">│</span>
        <span class="stag">CHAIN <b id="tag-chain">—</b></span>
        <span class="ssep">│</span>
        <span class="stag">CLIP <b id="tag-clip">—</b></span>
      </div>
      <div class="stimer" id="timer">00:00:00</div>
    </div>

  </div>
</div>

<script>
(() => {
  const COIN = "2Rbg9r58dRAEQyh7EsprEx5QVFSBG74yK2nw9bVXpump";
  const PUMP_BASE = "https://pump.fun/coin/" + COIN;

  const STREAMS = [
    {
      id: 1,
      name: "SYNTHI LIVE 1",
      clip: "20260325_185742:2144101_20260325_185705",
      date: "2026-03-25",
      duration: "~24m"
    }
  ];

  // ── state ──
  let currentIdx  = 0;
  let playing     = false;
  let timerHandle = null;
  let timerSecs   = 0;

  // ── refs ──
  const $ = id => document.getElementById(id);
  const streamList  = $("stream-list");
  const streamCount = $("stream-count");
  const npTitle     = $("np-title");
  const btnPrev     = $("btn-prev");
  const btnPlay     = $("btn-play");
  const btnNext     = $("btn-next");
  const btnPump     = $("btn-pump");
  const videoArea   = $("video-area");
  const placeholder = $("placeholder");
  const tagFormat   = $("tag-format");
  const tagSrc      = $("tag-src");
  const tagChain    = $("tag-chain");
  const tagClip     = $("tag-clip");
  const timerEl     = $("timer");
  const waveformEl  = $("waveform");

  // ── waveform build ──
  function buildWaveform() {
    const profile = [4,9,15,6,19,11,5,17,8,13,7,16,10,4,14,8,18,5,11,15];
    waveformEl.innerHTML = profile.map((h, i) => {
      const d  = (0.38 + Math.random() * 0.52).toFixed(2);
      const dl = (i * 0.048).toFixed(3);
      return `<div class="wf-bar" style="--d:${d}s;--dl:${dl}s;--a:${Math.max(2,h-6)}px;--b:${h+4}px;--c:${Math.max(2,h-3)}px;--e:${h+7}px"></div>`;
    }).join("");
  }

  // ── VU bar build ──
  function buildVU(active) {
    return Array.from({length: 12}, (_, i) => {
      const d  = (0.45 + Math.random() * 0.65).toFixed(2);
      const dl = (Math.random() * 0.5).toFixed(3);
      const base = active ? 6 : 3;
      const a = base;
      const b = active ? base + 8 + Math.floor(Math.random()*6) : base + 4;
      const c = active ? base + 2 : base + 1;
      const e = active ? base + 12 + Math.floor(Math.random()*5) : base + 5;
      const f = base;
      return `<div class="vu-bar" style="--d:${d}s;--dl:${dl}s;--a:${a}px;--b:${b}px;--c:${c}px;--e:${e}px;--f:${f}px"></div>`;
    }).join("");
  }

  // ── render sidebar ──
  function renderSidebar() {
    streamCount.textContent = STREAMS.length + " stream" + (STREAMS.length !== 1 ? "s" : "");
    streamList.innerHTML = STREAMS.map((s, idx) => {
      const active = idx === currentIdx;
      return `<div class="stream-item${active ? " active" : ""}" data-idx="${idx}">
        <div class="si-top">
          <span class="si-num">${String(s.id).padStart(2,"0")}</span>
          <span class="si-name">${esc(s.name)}</span>
        </div>
        <div class="si-meta">
          <span class="si-date">${esc(s.date)}</span>
          <span class="si-dur">${esc(s.duration)}</span>
          <span class="si-clip">CLIP</span>
        </div>
        <div class="vu-row">${buildVU(active)}</div>
      </div>`;
    }).join("");
  }

  // ── load stream ──
  function loadStream(idx) {
    if (idx < 0 || idx >= STREAMS.length) return;
    currentIdx = idx;
    const s = STREAMS[idx];
    const pumpUrl = PUMP_BASE + "?clip=" + encodeURIComponent(s.clip);

    // header
    npTitle.textContent = s.name;
    btnPump.href = pumpUrl;

    // statusbar tags
    tagFormat.textContent = "PUMP/HLS";
    tagSrc.textContent    = "PUMP.FUN";
    tagChain.textContent  = "SOLANA";
    tagClip.textContent   = s.clip.length > 22 ? s.clip.slice(0,22) + "…" : s.clip;

    // swap iframe
    const old = videoArea.querySelector("iframe");
    if (old) old.remove();
    placeholder.style.display = "none";

    const iframe = document.createElement("iframe");
    iframe.src = pumpUrl;
    iframe.allow = "autoplay; fullscreen";
    iframe.setAttribute("allowfullscreen", "");
    videoArea.appendChild(iframe);

    // play state
    playing = true;
    btnPlay.textContent = "⏸ PAUSE";
    btnPlay.classList.add("is-play");
    startTimer();

    // sidebar
    renderSidebar();
    const active = streamList.querySelector(".stream-item.active");
    if (active) active.scrollIntoView({ block: "nearest", behavior: "smooth" });
  }

  // ── timer ──
  function startTimer() {
    stopTimer();
    timerSecs = 0;
    timerEl.textContent = "00:00:00";
    timerHandle = setInterval(() => {
      timerSecs++;
      const h = String(Math.floor(timerSecs / 3600)).padStart(2,"0");
      const m = String(Math.floor(timerSecs % 3600 / 60)).padStart(2,"0");
      const s = String(timerSecs % 60).padStart(2,"0");
      timerEl.textContent = h + ":" + m + ":" + s;
    }, 1000);
  }
  function stopTimer() {
    if (timerHandle) { clearInterval(timerHandle); timerHandle = null; }
  }

  // ── transport ──
  function togglePlay() {
    playing = !playing;
    if (playing) {
      btnPlay.textContent = "⏸ PAUSE";
      btnPlay.classList.add("is-play");
      if (!timerHandle) startTimer();
    } else {
      btnPlay.textContent = "▶ PLAY";
      btnPlay.classList.remove("is-play");
      stopTimer();
    }
  }
  function changeStream(dir) {
    const n = currentIdx + dir;
    if (n >= 0 && n < STREAMS.length) loadStream(n);
  }

  // ── events ──
  streamList.addEventListener("click", e => {
    const item = e.target.closest(".stream-item");
    if (!item) return;
    const idx = Number(item.dataset.idx);
    if (Number.isFinite(idx)) loadStream(idx);
  });

  btnPlay.addEventListener("click", togglePlay);
  btnPrev.addEventListener("click", () => changeStream(-1));
  btnNext.addEventListener("click", () => changeStream(1));

  function esc(s) {
    return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]));
  }

  // ── init ──
  buildWaveform();
  renderSidebar();
  loadStream(0);
})();
</script>
</body>
</html>
